name: Build Android TWA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH
      - name: Restore keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          python3 -c "
import base64,os,re
data=os.environ.get('KEYSTORE_B64','')
data=re.sub(r'[^A-Za-z0-9+/=]','',data)
open('/tmp/dosecalc.jks','wb').write(base64.b64decode(data+'=='))
print('OK:',os.path.getsize('/tmp/dosecalc.jks'))
          "
      - name: Build TWA with Gradle
        run: |
          pip install Pillow --break-system-packages
          curl -fsSL -o /tmp/icon.png https://doseclac.fr/icone-512.png
          mkdir -p twa/app/src/main/res/mipmap-mdpi
          mkdir -p twa/app/src/main/res/mipmap-hdpi
          mkdir -p twa/app/src/main/res/mipmap-xhdpi
          mkdir -p twa/app/src/main/res/mipmap-xxhdpi
          mkdir -p twa/app/src/main/res/mipmap-xxxhdpi
          mkdir -p twa/app/src/main/res/values
          mkdir -p twa/app/src/main/AndroidManifest.xml || true
          python3 -c "
          from PIL import Image
          icon = Image.open('/tmp/icon.png').convert('RGBA')
          for d,s in [('mdpi',48),('hdpi',72),('xhdpi',96),('xxhdpi',144),('xxxhdpi',192)]:
              icon.resize((s,s),Image.LANCZOS).save(f'twa/app/src/main/res/mipmap-{d}/ic_launcher.png')
          "
          cat > twa/settings.gradle << 'SETTINGSEOF'
          rootProject.name = "DoseCalc"
          include ':app'
          SETTINGSEOF

          cat > twa/build.gradle << 'BUILDEOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          BUILDEOF

          cat > twa/app/build.gradle << 'APPEOF'
          plugins { id 'com.android.application' }
          android {
            compileSdk 35
            namespace "fr.doseclac.app"
            defaultConfig {
              applicationId "fr.doseclac.app"
              minSdk 21
              targetSdk 35
              versionCode 1
              versionName "1.0"
            }
            signingConfigs {
              release {
                storeFile file('/tmp/dosecalc.jks')
                storePassword 'DoseCalc2026'
                keyAlias 'dosecalc'
                keyPassword 'DoseCalc2026'
              }
            }
            buildTypes {
              release {
                minifyEnabled false
                signingConfig signingConfigs.release
              }
            }
          }
          dependencies {
            implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          APPEOF

          rm -rf twa/app/src/main/AndroidManifest.xml
          mkdir -p twa/app/src/main
          cat > twa/app/src/main/AndroidManifest.xml << 'MANIFESTEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application
              android:label="DoseCalc"
              android:icon="@mipmap/ic_launcher"
              android:theme="@android:style/Theme.NoTitleBar"
              android:allowBackup="true">
              <activity
                android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                android:exported="true">
                <meta-data
                  android:name="android.support.customtabs.trusted.DEFAULT_URL"
                  android:value="https://doseclac.fr/" />
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW" />
                  <category android:name="android.intent.category.DEFAULT" />
                  <category android:name="android.intent.category.BROWSABLE" />
                  <data android:scheme="https" android:host="doseclac.fr" />
                </intent-filter>
              </activity>
              <service
                android:name="com.google.androidbrowserhelper.trusted.DelegationService"
                android:exported="true">
                <intent-filter>
                  <action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE" />
                  <category android:name="android.intent.category.DEFAULT" />
                </intent-filter>
              </service>
            </application>
          </manifest>
          MANIFESTEOF

          cat > twa/app/src/main/res/values/strings.xml << 'STRINGSEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">DoseCalc</string>
          </resources>
          STRINGSEOF

          cat > twa/gradle.properties << 'PROPSEOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          PROPSEOF

          cd twa && gradle bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: dosecalc-android
          path: 'twa/app/build/outputs/bundle/release/*.aab'
          retention-days: 30
