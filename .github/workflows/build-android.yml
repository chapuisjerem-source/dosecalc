name: Build Android TWA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Create twa-manifest
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "fr.doseclac.app",
            "host": "doseclac.fr",
            "name": "DoseCalc — Calcul de doses infirmier",
            "launcherName": "DoseCalc",
            "display": "standalone",
            "themeColor": "#060d1a",
            "navigationColor": "#060d1a",
            "backgroundColor": "#060d1a",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://doseclac.fr/icone-512.png",
            "maskableIconUrl": "https://doseclac.fr/icone-512.png",
            "appVersion": "1",
            "appVersionCode": 1,
            "signingMode": "none",
            "generatorApp": "bubblewrap",
            "webManifestUrl": "https://doseclac.fr/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "orientation": "portrait",
            "fingerprints": [],
            "shortcuts": []
          }
          EOF
      - name: Build TWA
        run: echo "n" | bubblewrap build --skipPwaValidation --jdkPath "$JAVA_HOME"
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: dosecalc-android
          path: '*.aab'
          retention-days: 30
